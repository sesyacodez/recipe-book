{% extends 'base.html' %}

{% block content %}
  {% if create %}
    <h1>Add Recipe</h1>
  {% else %}
    <h1>Edit Recipe: {{ recipe.title }}</h1>
  {% endif %}

  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Save</button>
    <a href="{% url 'recipe_list' %}">Cancel</a>
  </form>

{% endblock %}
