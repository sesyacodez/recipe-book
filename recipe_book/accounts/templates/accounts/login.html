{% extends "base.html" %} {% block content %}
<h1>Login</h1>
{% if error %}
<p class="error">{{ error }}</p>
{% endif %}
<form method="post">
  {% csrf_token %}
  <label>Email:</label>
  <input type="text" name="email" required />
  <label>Password:</label>
  <input type="password" name="password" required />
  <button type="submit">Log In</button>
</form>
{% endblock %}
